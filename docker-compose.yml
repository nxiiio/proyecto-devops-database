services:
  database:
    image: mysql:8.0
    container_name: innovatech-database
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: innovatech
      MYSQL_USER: usuario
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - innovatech_db_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

volumes:
  innovatech_db_data:
